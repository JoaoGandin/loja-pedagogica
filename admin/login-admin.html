<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="../style.css">
        <link rel="shortcut icon" href="../assets/icon/logoIcon.ico" type="image/x-icon">
        <title>Login Admin | Materiais Pedagógicos</title>
    </head>
    <body>
        <header>
            <a href="../index.html"><img src="../assets/images/logo.png" alt="Logo" class="logo"></a>
            <nav class="menu-mobile" id="menu-mobile">
                <ul>
                    <li><a href="../index.html">Home</a></li>
                    <li><a href="../catalogo.html">Catálogo</a></li>
                    <li><a href="../contato.html">Contato</a></li>
                    <li><a href="../sobre.html">Sobre</a></li>
                </ul>
            </nav>
            <div>
                <button class="btn-mobile" aria-label="Abrir menu">
                    <img class="menu-hamburguer" src="../assets/images/menu.png" alt="Menu">
                </button>
                <a href="../login.html" aria-label="Acessar conta">
                    <img src="../assets/images/user.png" alt="Perfil">
                </a>
                <a href="#" aria-label="Pesquisar no site">
                    <img src="../assets/images/search.png" alt="Pesquisar">
                </a>
                <a href="#" aria-label="Ver carrinho de compras">
                    <img src="../assets/images/shopping bag.png" alt="Carrinho de compras">
                </a>
            </div>
        </header>
        <main>
            <section class="formulario-secao">
                <div class="formulario-container">
                    <h1>Painel Administrativo</h1>
                    <p class="formulario-descricao">Acesso restrito a administradores</p>
                    
                    <form class="formulario" aria-label="Formulário de login admin">
                        <div class="form-group">
                            <label for="email-admin">E-mail</label>
                            <input 
                                type="email" 
                                id="email-admin" 
                                name="email" 
                                placeholder="seu@email.com"
                                required
                                aria-required="true"
                                aria-label="Campo de e-mail para login admin"
                            >
                        </div>

                        <div class="form-group">
                            <label for="senha-admin">Senha</label>
                            <input 
                                type="password" 
                                id="senha-admin" 
                                name="senha" 
                                placeholder="••••••••"
                                required
                                aria-required="true"
                                aria-label="Campo de senha para login admin"
                            >
                        </div>

                        <button type="submit" class="btn-formulario">Entrar como Admin</button>
                    </form>
                </div>
            </section>
        </main>
        <footer>
            <div class="footer-column">
                <div>
                    <h4>Redes sociais</h4>
                    <ul>
                        <li><a href="#">Instagram</a></li>
                        <li><a href="#">Facebook</a></li>
                    </ul>
                </div>
                <div>
                    <h4>Contato</h4>
                    <ul>
                        <li>E-mail: <a href="mailto:email@exemplo.com">email@exemplo.com</a></li>
                        <li>WhatsApp: <a href="#">(xx) x xxxx-xxxx</a></li>
                    </ul>
                </div>
            </div>
            <p class="copyright"> &copy; 2026 Materiais Pedagógicos - Todos os direitos reservados</p>
        </footer>

        <!-- CARRINHO LATERAL -->
        <div class="overlay-carrinho" id="overlay-carrinho" aria-hidden="true"></div>
        <aside class="carrinho-lateral" id="carrinho-lateral" aria-label="Carrinho de compras"></aside>

        <script src="../script.js"></script>
    </body>
</html>
